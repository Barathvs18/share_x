# ═══════════════════════════════════════════════════════════════
#  Secure Share X — Docker Compose (2-Layer Optimized)
# ═══════════════════════════════════════════════════════════════
#  Services:
#    1. backend   → FastAPI + Hardhat Blockchain Combined (ports 8000, 8545)
#    2. frontend  → React + Vite (port 3000)
# ═══════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── Backend + Blockchain (Combined Layer) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sharex-backend
    ports:
      - "8000:8000"
      - "8545:8545"
    env_file:
      - ./backend/.env
    environment:
      - HARDHAT_RPC_URL=http://localhost:8545
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
    networks:
      - sharex-net
    restart: unless-stopped

  # ── React Frontend (UI Layer) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://13.60.44.227:8000
        - VITE_RPC_URL=http://13.60.44.227:8545
    container_name: sharex-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://13.60.44.227:8000
      - VITE_RPC_URL=http://13.60.44.227:8545
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sharex-net
    restart: unless-stopped

volumes:
  backend-uploads:

networks:
  sharex-net:
    driver: bridge
